services:
  backend:
    build: backend/
    env_file:
      - backend/.env
    ports:
      - "8000:8000" 
  frontend:
    build: frontend/
    stdin_open: true
    ports:
      - "8080:8080"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - "./frontend:/app:delegated"
      - /app/node_modules/
    working_dir: /app
    tty: true
